<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charlemos DTEC</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f7f3ec;
      --paper: #fffaf2;
      --ink: #201c18;
      --muted: #756b60;
      --line: #d8cfc2;
      --accent: #2947ff;
      --accent-soft: #e8ebff;
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    header {
      padding: 42px 20px 26px;
      text-align: center;
      border-bottom: 1px solid var(--line);
    }

    header h1 {
      margin: 0;
      font-size: clamp(2.3rem, 8vw, 5.8rem);
      letter-spacing: -0.08em;
      line-height: 0.9;
    }

    header p {
      max-width: 700px;
      margin: 18px auto 0;
      color: var(--muted);
      line-height: 1.5;
    }

    main {
      width: min(1120px, 92vw);
      margin: 32px auto 80px;
    }

    .layout {
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 24px;
    }

    .panel, .question, .hero-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 12px 30px rgba(40, 30, 20, 0.05);
    }

    .panel {
      padding: 22px;
      height: fit-content;
    }

    .hero-card {
      padding: 28px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: center;
    }

    .hero-card h2 {
      font-size: clamp(1.6rem, 4vw, 3rem);
      margin: 0 0 8px;
      letter-spacing: -0.06em;
    }

    .hero-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .live-badge {
      background: var(--accent);
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.86rem;
      white-space: nowrap;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 1.15rem;
    }

    label {
      display: block;
      margin: 14px 0 7px;
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fffdf8;
      color: var(--ink);
      border-radius: 13px;
      padding: 13px;
      font: inherit;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 15px;
      font: inherit;
      cursor: pointer;
      background: var(--ink);
      color: white;
    }

    button:hover { opacity: 0.9; }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .primary {
      width: 100%;
      margin-top: 18px;
      padding: 14px 18px;
      background: var(--accent);
    }

    .secondary {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filters input {
      flex: 1;
      min-width: 220px;
    }

    .filters select {
      width: 180px;
    }

    .question-list {
      display: grid;
      gap: 14px;
    }

    .question {
      padding: 20px;
    }

    .meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .tag {
      background: var(--accent-soft);
      color: var(--accent);
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 700;
    }

    .question h3 {
      margin: 0;
      font-size: 1.25rem;
      letter-spacing: -0.03em;
      line-height: 1.25;
      white-space: pre-wrap;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .count {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
    }

    .empty, .loading {
      text-align: center;
      color: var(--muted);
      padding: 50px 20px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
    }

    .notice {
      margin-top: 16px;
      padding: 13px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .error {
      background: #fff2f2;
      border: 1px solid #efb5b5;
      color: #8a1f1f;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 16px;
      display: none;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 30px;
    }

    @media (max-width: 900px) {
      .layout, .hero-card {
        grid-template-columns: 1fr;
      }

      .live-badge {
        width: fit-content;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Charlemos DTEC</h1>
  </header>

  <main>
    <div id="errorBox" class="error"></div>

    <div class="hero-card">
      <div>
        <h2>Haz tu pregunta para la charla</h2>
        <p>Escribe una duda breve. Si otra pregunta también te interesa, puedes votarla.</p>
      </div>
      <div class="live-badge">● charla en directo</div>
    </div>

    <div class="layout">
      <aside class="panel">
        <h2>Enviar pregunta</h2>

        <form id="questionForm">
          <label for="alias">Nombre o alias opcional</label>
          <input id="alias" placeholder="Ej. anon, 2º DTEC..." />

          <label for="category">Tema</label>
          <select id="category" required>
            <option value="Asignaturas">Asignaturas</option>
            <option value="TFG">TFG</option>
            <option value="Prácticas">Prácticas</option>
            <option value="Erasmus">Erasmus</option>
            <option value="Vida DTEC">Vida DTEC</option>
            <option value="Otra">Otra</option>
          </select>

          <label for="title">Pregunta</label>
          <textarea id="title" required maxlength="360" placeholder="Escribe aquí tu pregunta..."></textarea>

          <button class="primary" type="submit">Enviar pregunta</button>
        </form>

        <div class="notice">
          Las preguntas aparecen en directo y se ordenan por votos.
        </div>
      </aside>

      <section>
        <div class="filters">
          <input id="search" placeholder="Buscar preguntas..." />
          <select id="filterCategory">
            <option value="Todas">Todas</option>
            <option value="Asignaturas">Asignaturas</option>
            <option value="TFG">TFG</option>
            <option value="Prácticas">Prácticas</option>
            <option value="Erasmus">Erasmus</option>
            <option value="Portfolio">Portfolio</option>
            <option value="Futuro profesional">Futuro profesional</option>
            <option value="Vida DTEC">Vida DTEC</option>
            <option value="Otra">Otra</option>
          </select>
        </div>

        <div id="questionList" class="question-list">
          <div class="loading">Cargando preguntas...</div>
        </div>
      </section>
    </div>
  </main>

  <footer>
    Charlemos DTEC · preguntas en directo
  </footer>

  <script>
    const SUPABASE_URL = "https://ctoknbsfydtbwcdwoosy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_oxyo0yIspxzVQfPoRvVYlw_RReyLtU2";

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const questionForm = document.getElementById("questionForm");
    const questionList = document.getElementById("questionList");
    const searchInput = document.getElementById("search");
    const filterCategory = document.getElementById("filterCategory");
    const errorBox = document.getElementById("errorBox");

    let questions = [];

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = "block";
    }

    function hideError() {
      errorBox.textContent = "";
      errorBox.style.display = "none";
    }

    async function loadQuestions() {
      hideError();

      const { data, error } = await db
        .from("questions")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        showError("Error cargando preguntas: " + error.message);
        return;
      }

      questions = data || [];
      renderQuestions();
    }

    function formatDate(dateString) {
      return new Intl.DateTimeFormat("es", {
        day: "2-digit",
        month: "short",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(dateString));
    }

    function getFilteredQuestions() {
      const searchTerm = searchInput.value.toLowerCase();
      const selectedCategory = filterCategory.value;

      return questions
        .filter(q => selectedCategory === "Todas" || q.category === selectedCategory)
        .filter(q =>
          (q.title || "").toLowerCase().includes(searchTerm) ||
          (q.category || "").toLowerCase().includes(searchTerm) ||
          (q.alias || "").toLowerCase().includes(searchTerm)
        )
        .sort((a, b) => {
          const voteDifference = (b.votes || 0) - (a.votes || 0);
          if (voteDifference !== 0) return voteDifference;
          return new Date(b.created_at) - new Date(a.created_at);
        });
    }

    function renderQuestions() {
      const filteredQuestions = getFilteredQuestions();

      if (filteredQuestions.length === 0) {
        questionList.innerHTML = `<div class="empty">Todavía no hay preguntas.</div>`;
        return;
      }

      questionList.innerHTML = filteredQuestions.map(q => `
        <article class="question">
          <div class="meta">
            <span class="tag">${escapeHTML(q.category)}</span>
            <span>por ${escapeHTML(q.alias || "anon")}</span>
            <span>·</span>
            <span>${formatDate(q.created_at)}</span>
          </div>

          <h3>${escapeHTML(q.title)}</h3>

          <div class="actions">
            <button class="secondary" onclick="voteQuestion('${q.id}')">
              También quiero saberlo · <span class="count">${q.votes || 0}</span>
            </button>
          </div>
        </article>
      `).join("");
    }

    function escapeHTML(text) {
      return String(text || "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    questionForm.addEventListener("submit", async event => {
      event.preventDefault();
      hideError();

      const submitButton = questionForm.querySelector("button[type='submit']");
      submitButton.disabled = true;
      submitButton.textContent = "Enviando...";

      const newQuestion = {
        alias: document.getElementById("alias").value.trim() || "anon",
        category: document.getElementById("category").value,
        title: document.getElementById("title").value.trim(),
        votes: 0
      };

      const { error } = await db
        .from("questions")
        .insert([newQuestion]);

      submitButton.disabled = false;
      submitButton.textContent = "Enviar pregunta";

      if (error) {
        showError("No se ha podido enviar la pregunta: " + error.message);
        return;
      }

      questionForm.reset();
      await loadQuestions();
      document.querySelector("main").scrollIntoView({ behavior: "smooth" });
    });

    async function voteQuestion(id) {
      hideError();

      const question = questions.find(q => q.id === id);
      if (!question) return;

      const { error } = await db
        .from("questions")
        .update({ votes: (question.votes || 0) + 1 })
        .eq("id", id);

      if (error) {
        showError("No se ha podido votar: " + error.message);
        return;
      }

      await loadQuestions();
    }

    searchInput.addEventListener("input", renderQuestions);
    filterCategory.addEventListener("change", renderQuestions);

    db.channel("questions-live")
      .on("postgres_changes", { event: "*", schema: "public", table: "questions" }, () => {
        loadQuestions();
      })
      .subscribe();

    loadQuestions();
  </script>
</body>
</html>
